stages:
    - cache
    - lint
    - bundle
    - test
    - build

cache:
    key:
        files:
            - composer.lock
            - package-lock.json
    paths:
        - .npm
        - .composer/cache
    policy: pull-push

variables:
    COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer/cache"

cache:npm:
    image: node:20-alpine
    stage: cache
    script:
        - npm ci --cache .npm --prefer-offline --no-audit

cache:composer:
    image: composer:2
    stage: cache
    script:
        - composer install --prefer-dist --no-progress --no-interaction --no-scripts

lint:eslint:
    stage: lint
    image: node:20-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline --no-audit
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

lint:phpcs:
    image: composer:2
    stage: lint
    before_script:
        - composer install --prefer-dist --no-progress --no-interaction --no-scripts
    script:
        - vendor/bin/phpcs -s

lint:phpstan:
    image: composer:2
    stage: lint
    before_script:
        - composer install --prefer-dist --no-progress --no-interaction --no-scripts
    script:
        - vendor/bin/phpstan analyse --memory-limit=-1 --error-format=gitlab | tee phpstan-report.json
    artifacts:
        when: always
        reports:
            codequality: phpstan-report.json
        expire_in: 1 hour

lint:phpmd:
    image: composer:2
    stage: lint
    before_script:
        - composer install --prefer-dist --no-progress --no-interaction --no-scripts
    script:
        - vendor/bin/phpmd src gitlab phpmd.xml | tee phpmd-report.json
    artifacts:
        when: always
        reports:
            codequality: phpmd-report.json
        expire_in: 1 hour

bundle:assets:
    stage: bundle
    image: node:20-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline --no-audit
    script:
        - npm run build
    artifacts:
        paths:
            - public/build/
        expire_in: 1 hour

test:phpunit:
    image: composer:2
    stage: test
    variables:
        XDEBUG_MODE: coverage
    before_script:
        - apk add --no-cache unzip
        - curl -sSLf -o /usr/local/bin/install-php-extensions https://github.com/mlocati/docker-php-extension-installer/releases/latest/download/install-php-extensions
        - chmod +x /usr/local/bin/install-php-extensions
        - install-php-extensions zip bcmath intl xdebug
        - composer install --prefer-dist --no-progress --no-interaction --no-scripts
        - mkdir var
        - touch var/data.db
        - php bin/console --env=test doctrine:schema:create --no-interaction
        - php bin/console --env=test doctrine:fixtures:load --no-interaction
    script:
        - vendor/bin/phpunit -c phpunit.xml --coverage-text --coverage-clover=coverage.xml --colors=never --log-junit phpunit-report.xml
    coverage: '/^\s*Lines:\s*\d+.\d+\%/'
    artifacts:
        when: always
        paths:
            - coverage.xml
            - phpunit-report.xml
        reports:
            junit: phpunit-report.xml
        expire_in: 1 hour

build:project:
    stage: build
    image: alpine:3
    rules:
        -   if: $CI_COMMIT_TAG
            when: on_success
        -   if: $CI_COMMIT_BRANCH
            when: manual
    before_script:
        - apk add --no-cache zip
        - mv $ENV_FILE .env
        - echo "" >> .env
        - echo "VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" >> .env
    script:
        - zip -r project.zip .env compose.yml
    artifacts:
        paths:
            - .env
            - .gitlab/ansible/
            - compose.yml
            - project.zip
        access: none
        expire_in: 1 hour
    dependencies: []

build:docker:
    stage: build
    image: docker:29
    needs:
        - build:project
    services:
        - docker:29-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    script:
        - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        - docker compose build
        - docker compose push
    dependencies:
        - build:project
